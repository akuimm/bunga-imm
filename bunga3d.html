<style>
  :root {
    --expandable-section-background: #2b2d30;
    --expandable-section-text: #EEEEEE;
    --text-on-expandable-background: #F5F5F5;
    --number-input-background: #212121;
  }

  html, body {
    width: 100vw;
    height: 100lvh;
    overflow: hidden;
  }

  .hamburger {
    position: absolute;
    z-index: 999;
    top: 0.72rem;
    left: 0.72rem;
    border-radius: 4px;
    width: 3rem;
    height: 3rem;
    cursor: pointer;
    box-shadow: 2.75px 2.75px 4px 0px #00000024;
    background: #ffffffc4;
    backdrop-filter: blur(4px) brightness(0.92);
    display: none;
  }

  .hamburger input {
    display: none;
  }

  .hamburger svg {
    /* The size of the SVG defines the overall size */
    height: 3em;
    /* Define the transition for transforming the SVG */
    transition: transform 600ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  .line {
    fill: none;
    stroke: #3c4043;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-width: 3;
    /* Define the transition for transforming the Stroke */
    transition: stroke-dasharray 600ms cubic-bezier(0.4, 0, 0.2, 1),
      stroke-dashoffset 600ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  .line-top-bottom {
    stroke-dasharray: 12 63;
  }

  .hamburger input:checked+svg {
    transform: rotate(-45deg);
  }

  .hamburger input:checked+svg .line-top-bottom {
    stroke-dasharray: 20 300;
    stroke-dashoffset: -32.42;
  }

  body {
    margin: 0;
    overflow: hidden;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .header {
    align-items: center;
    display: flex;
    flex: 0 0 auto;
    height: 48px;
    justify-content: space-between;
    padding: 0 12px;
  }

  /* Container for renderer (left) and tabs (right). */
  .editor-body-root {
    display: flex;
    flex: auto;
    /* Grows to fill space under header */
    height: 0;
    overflow: hidden;
  }

  .mvContainer {
    align-items: stretch;
    display: flex;
    flex-direction: column;
    height: 100%;
    position: relative;
    width: 100%;
  }

  model-viewer-preview {
    height: 100%;
  }

  me-tabs {
    background-color: #202124;
    /* GOOGLE_GREY_900 */
    padding: 0;
    width: 360px;
    min-width: 360px;
    max-width: 360px;
  }

  me-tabs a {
    color: #dadcff;
    /* GOOGLE_GREY_300, but.. bluer */
  }

  me-tabbed-panel {
    max-height: calc(100vh - 105px);
    overflow-y: auto;
    display: block;
  }

  me-tabbed-panel::-webkit-scrollbar {
    width: 8px;
    background-color: #c1c1c1;
    border-radius: 0.2rem;
  }

  me-tabbed-panel::-webkit-scrollbar-thumb {
    background-color: #202124b0;
    border-radius: 0.2rem;
  }

  me-tabbed-panel::-webkit-scrollbar-thumb:hover {
    background-color: #202124b8;
  }

  .privacy {
    color: #BDBDBD;
    padding: 5px 16px;
    position: absolute;
    bottom: 0;
    font-size: small;
    z-index: 0;
    background-color: rgba(32, 33, 36, .75);
    backdrop-filter: blur(5px) brightness(0.92) saturate(1.27) contrast(1.2);
  }

  @media only screen and (max-width: 768px) {
    me-tabs {
      position: absolute;
      top: 0;
      right: 0;
      transform: translateX(100%);
      transition: transform 600ms cubic-bezier(0.4, 0, 0.2, 1);
      min-height: 100%;
    }

    .hamburger {
      display: block;
    }

    .hamburger:has(>input:checked)+model-editor me-tabs {
      transform: translateX(0);
    }

  }

  @media only screen and (max-width: 450px) {
    me-tabs {
      min-width: 100%;
    }
  }

  @media only screen and (max-height: 600px) {
    .privacy {
      z-index: -1;
    }
  }

  .privacy-link {
    color: #BDBDBD;
  }
